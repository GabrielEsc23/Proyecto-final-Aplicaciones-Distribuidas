<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Iniciar Sesión - Tareas</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 400px; margin: 100px auto; padding: 20px; border: 1px solid #ccc; }
        input { width: 100%; padding: 8px; margin-bottom: 15px; }
        button { width: 100%; padding: 10px; background-color: #007bff; color: white; border: none; }
    </style>
</head>
<body>
    <h2>Plataforma de Tareas - Login</h2>
    <form action="/login" method="POST">
        <label>Correo Institucional del Estudiante:</label>
        <input type="email" name="correo" required placeholder="ejemplo@epn.edu.ec">
        <button type="submit">Ingresar</button>
    </form>
</body>
</html>
